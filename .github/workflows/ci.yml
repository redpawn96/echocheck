name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        env:
          PYTHONPATH: apps/api
        run: pytest -m unit tests/unit

      - name: Run API tests
        env:
          PYTHONPATH: apps/api
          DATABASE_URL: sqlite+pysqlite:///./tests/test_api.db
          JWT_SECRET_KEY: test-secret
        run: pytest -m api tests/api

  web-build:
    name: Web Build (Node 24.14.0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
